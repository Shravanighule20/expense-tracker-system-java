<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Profile</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h1 class="mb-4">
            Update Profile
        </h1>
        <a href="/dashboard"
           class="btn btn-dark mb-4">

            Back

        </a>
        <!-- PROFILE IMAGE -->

        <div class="text-center mb-4">

            <img th:if="${user.profilePic != null}"
                 th:src="@{/uploads/{img}(img=${user.profilePic})}"
                 width="120"
                 height="120"
                 class="rounded-circle border">

        </div>

        <form th:action="@{/updateProfile}"
              method="post"
              enctype="multipart/form-data"
              th:object="${user}">

            <!-- NAME -->

            <input type="text"
                   th:field="*{name}"
                   class="form-control mb-3">

            <!-- EMAIL -->

            <input type="email"
                   th:field="*{email}"
                   class="form-control mb-3"
                   readonly>

            <!-- IMAGE -->

            <input type="file"
                   name="image"
                   class="form-control mb-3">

            <!-- BUTTON -->

            <button class="btn btn-primary w-100">

                Update Profile

            </button>

        </form>

    </div>

</div>

</body>
</html>

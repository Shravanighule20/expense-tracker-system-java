<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-5">

        <h1>Admin Dashboard</h1>

        <a href="/logout"
           class="btn btn-danger">

            Logout

        </a>

    </div>

    <!-- CARDS -->

    <div class="row mb-5">

        <div class="col-md-3">

            <div class="card bg-primary
                        text-white p-4 shadow">

                <h4>Total Users</h4>

                <h2 th:text="${totalUsers}">
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success
                        text-white p-4 shadow">

                <h4>Active Users</h4>

                <h2 th:text="${activeUsers}">
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger
                        text-white p-4 shadow">

                <h4>Inactive Users</h4>

                <h2 th:text="${inactiveUsers}">
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark
                        text-white p-4 shadow">

                <h4>System Expense</h4>

                <h2>
                    ₹
                    <span th:text="${systemExpense}">
                    </span>
                </h2>

            </div>

        </div>

    </div>

    <!-- USERS TABLE -->

    <table class="table table-bordered
                  table-hover bg-white shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="user : ${users}">

            <td th:text="${user.id}"></td>

            <td th:text="${user.name}"></td>

            <td th:text="${user.email}"></td>

            <td th:text="${user.role}"></td>

            <td th:text="${user.status}"></td>

            <td>

                <!-- ACTIVE -->

                <a th:if="${user.status == 'ACTIVE'}"
                   th:href="@{/deactivateUser/{id}(id=${user.id})}"
                   class="btn btn-danger btn-sm">

                    Deactivate

                </a>

                <!-- INACTIVE -->

                <a th:if="${user.status == 'INACTIVE'}"
                   th:href="@{/activateUser/{id}(id=${user.id})}"
                   class="btn btn-success btn-sm">

                    Activate

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>

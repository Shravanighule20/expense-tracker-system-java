<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Expense</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h1 class="mb-4">

            Edit Expense

        </h1>
        <a href="/dashboard"
           class="btn btn-dark mb-4">

            Back

        </a>
        <form th:action="@{/updateExpense}"
              method="post"
              th:object="${expense}">

            <!-- ID -->

            <input type="hidden"
                   th:field="*{id}">

            <!-- AMOUNT -->

            <input type="number"
                   step="0.01"
                   th:field="*{amount}"
                   class="form-control mb-3">

            <!-- CATEGORY -->

            <select th:field="*{category}"
                    class="form-control mb-3">

                <option value="Food">
                    Food
                </option>

                <option value="Travel">
                    Travel
                </option>

                <option value="Shopping">
                    Shopping
                </option>

                <option value="Bills">
                    Bills
                </option>

                <option value="Entertainment">
                    Entertainment
                </option>

            </select>

            <!-- DATE -->

            <input type="date"
                   th:field="*{expenseDate}"
                   class="form-control mb-3">

            <!-- BUTTON -->

            <button class="btn btn-primary w-100">

                Update Expense

            </button>

        </form>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Expense</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <a href="/dashboard"
       class="btn btn-dark mb-4">

        Back

    </a>

    <div class="d-flex justify-content-between mb-4">

        <h1>Manage Expenses</h1>

    </div>

    <!-- SEARCH + FILTER -->

    <div class="card p-4 shadow mb-4">

        <form action="/manageExpense"
              method="get">

            <div class="row">

                <!-- CATEGORY -->

                <div class="col-md-4">

                    <input type="text"
                           name="category"
                           class="form-control"
                           placeholder="Search Category">

                </div>

                <!-- DATE -->

                <div class="col-md-3">

                    <input type="date"
                           name="date"
                           class="form-control">

                </div>

                <!-- MONTH -->

                <div class="col-md-3">

                    <select name="month"
                            class="form-control">

                        <option value="">
                            Select Month
                        </option>

                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>

                    </select>

                </div>

                <!-- BUTTON -->

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">

                        Search

                    </button>

                </div>

            </div>

        </form>

    </div>

    <!-- TABLE -->

    <table class="table table-bordered
                  table-hover bg-white shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Edit</th>
            <th>Delete</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="expense : ${expenses}">

            <td th:text="${expense.id}"></td>

            <td>
                ₹
                <span th:text="${expense.amount}">
                </span>
            </td>

            <td th:text="${expense.category}">
            </td>

            <td th:text="${expense.expenseDate}">
            </td>

            <!-- EDIT -->

            <td>

                <a th:href="@{/editExpense/{id}(id=${expense.id})}"
                   class="btn btn-warning">

                    Edit

                </a>

            </td>

            <!-- DELETE -->

            <td>

                <a th:href="@{/deleteExpense/{id}(id=${expense.id})}"
                   class="btn btn-danger">

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>

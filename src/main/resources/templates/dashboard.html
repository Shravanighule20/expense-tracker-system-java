<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>

        body{
            background-color: #f3f4f6;
        }

        .sidebar{
            height: 100vh;
            background: #111827;
            color: white;
            padding: 30px;
        }

        .sidebar h2{
            margin-bottom: 40px;
        }

        .sidebar a{
            display: block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .sidebar a:hover{
            color: #60a5fa;
        }

        .card-box{
            border-radius: 15px;
            padding: 30px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card1{
            background: linear-gradient(
                    to right,
                    #4f46e5,
                    #3b82f6
            );
        }

        .card2{
            background: linear-gradient(
                    to right,
                    #16a34a,
                    #22c55e
            );
        }

        .card3{
            background: linear-gradient(
                    to right,
                    #f59e0b,
                    #f97316
            );
        }

        .card4{
            background: linear-gradient(
                    to right,
                    #111827,
                    #374151
            );
        }

        .card5{
            background: linear-gradient(
                    to right,
                    #9333ea,
                    #c084fc
            );
        }

        .card6{
            background: linear-gradient(
                    to right,
                    #dc2626,
                    #f87171
            );
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar">

            <h2>Expense Tracker</h2>

            <a href="/dashboard">
                Dashboard
            </a>

            <a href="/addExpense">
                Add Expense
            </a>

            <a href="/manageExpense">
                Manage Expense
            </a>

            <a href="/setBudget">
                Set Budget
            </a>

            <a href="/profile">
                Profile
            </a>

            <a href="/logout">
                Logout
            </a>

        </div>

        <!-- MAIN CONTENT -->

        <div class="col-md-10 p-5">

            <h1 class="mb-5">
                User Dashboard
            </h1>

            <!-- CARDS -->

            <div class="row">

                <!-- TODAY -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card1">

                        <h4>Today's Expense</h4>

                        <h2>
                            ₹
                            <span th:text="${todayExpense}">
                            </span>
                        </h2>

                    </div>

                </div>

                <!-- LAST 7 DAYS -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card2">

                        <h4>Last 7 Days</h4>

                        <h2>
                            ₹
                            <span th:text="${last7DaysExpense}">
                            </span>
                        </h2>

                    </div>

                </div>

                <!-- LAST 30 DAYS -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card3">

                        <h4>Last 30 Days</h4>

                        <h2>
                            ₹
                            <span th:text="${last30DaysExpense}">
                            </span>
                        </h2>

                    </div>

                </div>

                <!-- TOTAL -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card4">

                        <h4>Total Expense</h4>

                        <h2>
                            ₹
                            <span th:text="${totalExpense}">
                            </span>
                        </h2>

                    </div>

                </div>

                <!-- BUDGET -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card5">

                        <h4>Monthly Budget</h4>

                        <h2>
                            ₹
                            <span th:text="${budgetAmount}">
                            </span>
                        </h2>

                    </div>

                </div>

                <!-- REMAINING -->

                <div class="col-md-4 mb-4">

                    <div class="card-box card6">

                        <h4>Remaining Budget</h4>

                        <h2>
                            ₹
                            <span th:text="${remainingBudget}">
                            </span>
                        </h2>

                    </div>

                </div>

            </div>

            <!-- CHART -->

            <div class="row mt-5">

                <div class="col-md-6">

                    <div class="card p-4 shadow">

                        <h3 class="mb-4">
                            Expense Categories
                        </h3>

                        <canvas id="expenseChart">
                        </canvas>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js">
</script>

<script>

    const ctx =
        document.getElementById('expenseChart');

    new Chart(ctx, {

        type: 'pie',

        data: {

            labels: [
                'Food',
                'Travel',
                'Shopping',
                'Bills',
                'Entertainment'
            ],

            datasets: [{

                data: [

                    [[${food}]],
                    [[${travel}]],
                    [[${shopping}]],
                    [[${bills}]],
                    [[${entertainment}]]

                ]

            }]
        }
    });

</script>

</body>
</html>
